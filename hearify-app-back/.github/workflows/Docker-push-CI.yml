# This workflow builds an image and pushes it to Dockerhub

name: CI API

# Setting up triggers
on:
  push:
    branches:
      - 'dev'
      - 'main'

# Specifying job
jobs:
  build:
    # Using the most stable version
    runs-on: ubuntu-22.04
    steps:
    # Checking out whether our repo exists
      - name: Checkout
        uses: actions/checkout@v2
    # Settomg up Docker buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    # Description in the name of the step
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    # Building and pushing :)
      - name: Build and push app Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: hearifyapp/hearify-api:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha, mode=max
