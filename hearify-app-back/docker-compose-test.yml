version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: hearify_api_test
    command: uvicorn main:test_application_factory --workers 2 --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    volumes:
      - ./web/:/usr/src/
      - ./files/:/usr/files/
    env_file:
      - test.env

  celery:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: hearify_queue_test
    command: celery -A tasks.tasks worker -c 1 --prefetch-multiplier 1 --loglevel=info
    volumes:
      - ./web/:/usr/src/
    env_file:
      - test.env
    depends_on:
      - redis

  redis:
    image: redis:6-alpine
    container_name: hearify_redis_test
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  mongodb_log:
  redis_data: